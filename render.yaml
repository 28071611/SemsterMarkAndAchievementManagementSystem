services:
  # Backend API Service
  - type: web
    name: edutrack-api
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false # Will be set manually in Render dashboard
    healthCheckPath: /api/test
    
  # Frontend Static Site
  - type: web
    name: edutrack-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && npm run build
    staticPublishPath: frontend/build
    routes:
      - type: rewrite
        source: /api/*
        destination: https://semstermarkandachievementmanagementsyste.onrender.com/api/*
      - type: rewrite
        source: /**/*
        destination: /index.html
